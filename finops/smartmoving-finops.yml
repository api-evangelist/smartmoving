description: >-
  FinOps view of SmartMoving Open API spend. The Open API is an add-on to the
  SmartMoving Growth product subscription. The Basic tier is included at no
  extra charge (20,000 calls/month, read-only). The Premium tier is a flat
  $149/month recurring fee (125,000 calls/month, read/write plus webhooks), with
  variable overage in the form of $149 call packs purchased when the monthly
  quota is exhausted. Cost therefore has a fixed subscription component plus an
  optional usage-driven overage component; the dominant lever is staying within
  the monthly call quota. The Lead API is free and does not contribute to spend.
notes: >-
  Underlying SmartMoving Growth-plan subscription pricing is quote-based and not
  reconciled here. Figures reflect the published Open API help documentation as
  of the review date; verify current rates before reconciliation.
