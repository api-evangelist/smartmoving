meters:
- name: premium_subscription
  description: Flat monthly Premium Open API subscription fee ($149/month).
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: api_calls
  description: Open API calls consumed against the tier's monthly quota (20k Basic / 125k Premium).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - tier
- name: overage_packs
  description: Additional Premium call packs purchased when the monthly quota is exhausted ($149 each).
  unit: packs
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly Open API call volume per account against the tier quota; watch for approach to the 20k/125k caps.
- name: Allocation
  description: Attribute call volume to the integrations that generate it (reporting sync, automation, webhooks) to see which workloads drive overage.
- name: Optimization
  description: Prefer webhooks over polling to cut read volume, batch and paginate efficiently, and cache reference data (branches, users, service types) to stay under the monthly quota and avoid $149 overage packs.
- name: Accountability
  description: Assign an owner to the SmartMoving Premium subscription; review monthly usage and auto-purchase settings so overage packs are a deliberate decision.
