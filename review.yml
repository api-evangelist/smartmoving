actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. SmartMoving's public API is
    request/response REST (the Open API and the Lead Provider endpoint), and
    its only server-push mechanism is Premium outbound webhooks (HTTP
    callbacks). No AsyncAPI document was created because there is no
    server-push, bidirectional, or streaming WebSocket transport on
    SmartMoving's API to model.
