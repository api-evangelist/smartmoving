aid: smartmoving
name: SmartMoving
review:
  question: Does SmartMoving expose a documented public WebSocket API?
  answer: false
  date: '2026-07-04'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. SmartMoving's public API surface is
    request/response REST over HTTPS (the Open API fronted by Azure API
    Management, plus the free Lead Provider intake endpoint). Its only
    server-initiated mechanism is outbound webhooks - HTTP POST callbacks to a
    URL the customer registers - which is server-to-endpoint HTTP, not a
    bidirectional WebSocket transport, and is a Premium-tier feature rather than
    a streaming API. There is no ws:// or wss:// endpoint to model.
findings:
  summary: |
    SmartMoving does not publish a documented public WebSocket API. SmartMoving
    is an all-in-one CRM and operations platform for moving companies. It
    exposes an Open API (base https://api.smartmoving.com/api, fronted by Azure
    API Management at smartmoving-prod-api-management.developer.azure-api.net)
    to Growth-plan customers, authenticated with an x-api-key header. The Open
    API is pure request/response REST covering customers, opportunities
    (quotes/estimates), leads, jobs (booked moves), payments, and follow-ups. A
    separate, free Lead Provider API (POST /leads/from-provider/v2, authed by a
    providerKey query parameter) accepts inbound leads on every plan. Real-time
    notification is handled by Premium-tier outbound webhooks (HTTP callbacks
    across leads, jobs, payments, documents, and customers), not by a WebSocket.
    No ws:// or wss:// endpoint is documented anywhere in SmartMoving's help
    articles or Developer Portal as of the review date.
  openSource: |
    SmartMoving is a proprietary, closed-source SaaS product. No official
    open-source SDK is published; community wrappers exist (e.g. GitHub
    Shadow0Broker/SmartMoving and a Make.com community integration), but the
    platform and API themselves are not open source.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.smartmoving.com/api
      documented: true
      note: Open API (customers, opportunities, leads, jobs, payments, follow-ups). x-api-key header auth; Azure API Management gateway.
    - protocol: REST
      scheme: https
      baseURL: https://api.smartmoving.com/api/leads/from-provider/v2
      documented: true
      note: Free Lead Provider intake endpoint. Authenticated by a providerKey query parameter, available on all plans.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Premium-tier outbound HTTP POST callbacks across leads, jobs, payments, documents, and customers. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in SmartMoving's API as of the review date.
